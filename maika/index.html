<template id="skill-card-2">

<!-- Personality Modal -->
<template id="modal-skill-card-1-template">
  <section class="modal" id="modal-skill-card-1" aria-hidden="true" aria-label="Personality modal" role="dialog">
    <div class="modal-box" role="document">
      <header class="modal-head">
        <button class="modal-close" type="button" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
        <h3 class="modal-title"><i class="fa-solid fa-user"></i> My personality & work style</h3>
        <div class="modal-meta" aria-label="my values">
          <span class="chip"><i class="fa-solid fa-rocket"></i>AMBITION</span>
          <span class="chip"><i class="fa-solid fa-shield-heart"></i>LOYALTY</span>
          <span class="chip"><i class="fa-solid fa-heart"></i>CARE</span>
        </div>
      </header>
      <div class="modal-body">
        <div class="bullets">
          <div class="bullet">
            <i class="fa-solid fa-globe-africa"></i>
            <p><strong>Curious, international by default:</strong> I’ve built and run ops across Europe and Africa; I’m at ease in multicultural teams and I adapt fast on the ground (Paris ↔ Madagascar rhythm).</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-sitemap"></i>
            <p><strong>Structured, scalable thinking:</strong> I turn messy production into clear systems: playbooks, routines, staffing logic, and decision rules that survive growth and new clients.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-handshake"></i>
            <p><strong>Team-first, leader-builder:</strong> I grow managers into leaders, delegate with trust, and install a culture of responsibility and transparency — exactly what Maïka wants to scale.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-chart-line"></i>
            <p><strong>Analytical, quality-driven:</strong> I love KPIs, dashboards, QA loops, and tight reporting — not for vanity, but to protect quality and client satisfaction.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-compass"></i>
            <p><strong>Calm under pressure:</strong> Peaks, incidents, reorgs: I stay composed, communicate clearly, and keep execution moving while keeping people safe and engaged.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<!-- Fit Modal -->
<template id="modal-skill-card-2-template">
  <section class="modal" id="modal-skill-card-2" aria-hidden="true" aria-label="why fit modal" role="dialog">
    <div class="modal-box" role="document">
      <header class="modal-head">
        <button class="modal-close" type="button" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
        <h3 class="modal-title"><i class="fa-solid fa-rocket"></i> how I would impact <span class="dynamic-company-inline">...</span></h3>
        <div class="modal-sub">Joining to tackle BPO’s AI revolution and international scaling — while delivering my ops expertise.</div>
      </header>
      <div class="modal-body">
        <div class="bullets">
          <div class="bullet">
            <i class="fa-solid fa-globe"></i>
            <p><strong>Drawn to the international scope:</strong> Paris strategy + Madagascar talent pool is my wheelhouse — I’ve led ops across 17 African countries and global hubs, and I love the cross-cultural execution challenge.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-robot"></i>
            <p><strong>Excited by BPO’s AI transformation:</strong> Outsourcing is being rewritten by AI; I want to be inside Maïka’s journey, blending human expertise with smart tools to keep you ahead of the curve.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-layer-group"></i>
            <p><strong>Scale your production end-to-end:</strong> I’ll structure support, compliance, back-office, and collections into one cohesive, peak-proof machine, inspired by scaling work at Meero, Malt, and Teleperformance.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-chart-line"></i>
            <p><strong>Build a sharp KPI & QA cockpit:</strong> I’ll install dashboards, quality routines, and client reporting that give real-time visibility on performance, costs, and satisfaction — not just numbers, but decisions.</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-users-gear"></i>
            <p><strong>Grow Madagascar leadership:</strong> I’m used to multicultural, multi-country management and on-site cadence; I’ll coach your managers/supervisors into a self-sufficient bench aligned with Maïka’s next growth phase.</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>



<script>
  fetch('../shared/cv-body.html')
    .then(response => response.text())
    .then(html => {
      document.getElementById('app').innerHTML = html;

      // 1. SELECT TEMPLATES
      const card1Template  = document.getElementById('skill-card-1');
      const card2Template  = document.getElementById('skill-card-2');
      const modal1Template = document.getElementById('modal-skill-card-1-template');
      const modal2Template = document.getElementById('modal-skill-card-2-template');

      // 2. SELECT PLACEHOLDERS
      const placeholder1 = document.querySelector('[data-placeholder="skill-card-1"]');
      const placeholder2 = document.querySelector('[data-placeholder="skill-card-2"]');

      // 3. INJECT CARDS
      if (placeholder1 && card1Template) placeholder1.replaceWith(card1Template.content.cloneNode(true));
      if (placeholder2 && card2Template) placeholder2.replaceWith(card2Template.content.cloneNode(true));

      // 4. INJECT MODALS TO BODY
      if (modal1Template) document.body.appendChild(modal1Template.content.cloneNode(true));
      if (modal2Template) document.body.appendChild(modal2Template.content.cloneNode(true));

      // 5. DYNAMIC HERO TEXT
      const heroPersonalityText = document.getElementById('hero-text-personality');
      if (heroPersonalityText && card1Template) {
        const card1Title = card1Template.content.querySelector('h3');
        if (card1Title) {
          // Get text only, stripping the icon
          heroPersonalityText.textContent = card1Title.textContent.trim();
        }
      }

      // 6. LOAD MAIN.JS
      const script = document.createElement('script');
      script.src = '../js/main.js';
      document.body.appendChild(script);
    });
</script>

</body>
</html>
