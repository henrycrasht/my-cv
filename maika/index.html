<!-- COMPANY-SPECIFIC SKILL CARDS Hidden Templates -->

  <div class="info reveal" data-modal="modal-skill-card-1" role="button" tabindex="0">
    <h3><i class="fa-solid fa-compass"></i> My work style</h3>
    <div class="tags">
      <span class="tag"><i class="fa-solid fa-map-signs"></i> ops builder</span>

      <span class="tag"><i class="fa-solid fa-layer-group"></i> structured</span>
      <span class="tag"><i class="fa-solid fa-shield-halved"></i> reliable</span>
    </div>
  </div>
</template>

<template id="skill-card-2">
  <div class="info reveal" data-modal="modal-skill-card-2" role="button" tabindex="0">
    <h3><i class="fa-solid fa-globe-africa"></i> Madagascar + Paris: I Know This Model</h3>
    <div class="tags">
      <span class="tag"><i class="fa-solid fa-headset"></i>BPO</span>

<!-- COMPANY-SPECIFIC MODAL Hidden -->

<!-- Personality Modal -->
<template id="modal-skill-card-1-template">
  <section class="modal" id="modal-skill-card-1" aria-hidden="true" aria-label="Personality modal" role="dialog">
    <div class="modal-box" role="document">
      <header class="modal-head">
        <button class="modal-close" type="button" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
        <h3 class="modal-title"><i class="fa-solid fa-compass"></i> Built to Scale, Wired for the Field</h3>
        <div class="modal-meta" aria-label="my values">
          <span class="chip"><i class="fa-solid fa-gauge-high"></i>AUTONOMY</span>
          <span class="chip"><i class="fa-solid fa-star"></i>ACCOUNTABILITY</span>
          <span class="chip"><i class="fa-solid fa-heart"></i>ADAPTABILITY</span>
        </div>
      </header>
      <div class="modal-body">
        <div class="bullets">
          <div class="bullet">
            <i class="fa-solid fa-map-signs"></i>
            <p><strong>Field-first mindset: </strong>I've built and run teams across 4 continents — I know that great ops require presence, not just dashboards</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-cogs"></i>
            <p><strong>Process architect: </strong>From blank-page to full operational frameworks — KPIs, QA routines, staffing models — I build systems that hold under pressure</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-users"></i>
            <p><strong>Natural team builder: </strong>I develop managers, not just manage headcount — my goal is always to make myself replaceable at each level</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-chart-line"></i>
            <p><strong>Data-driven: </strong>Looker, Salesforce, custom dashboards — I pilot by numbers and push teams to do the same</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-lightbulb"></i>
            <p><strong>Pragmatic innovator: </strong>I introduce tools and methods that stick, not just the trendy ones</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<!-- Fit Modal -->
<template id="modal-skill-card-2-template">
  <section class="modal" id="modal-skill-card-2" aria-hidden="true" aria-label="why fit modal" role="dialog">
    <div class="modal-box" role="document">
      <header class="modal-head">
        <button class="modal-close" type="button" aria-label="Close"><i class="fa-solid fa-xmark"></i></button>
        <h3 class="modal-title"><i class="fa-solid fa-globe-africa"></i> Ops Excellence @ <span class="dynamic-company-inline">...</span></h3>
        <div class="modal-sub">The bridge between your Paris clients and your Madagascar teams — operational, strategic, and on the ground.</div>
      </header>
      <div class="modal-body">
        <div class="bullets">
          <div class="bullet">
            <i class="fa-solid fa-link"></i>
            <p><strong>Offshore expertise: </strong>Launched and managed outsourced/offshored ops at Meero (Bangalore), cutting costs by 80% while maintaining quality standards — directly transferable to the Madagascar model</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-shield-alt"></i>
            <p><strong>Quality obsession: </strong>Designed QA systems (ticket reviews, scoring, SLA tracking) for multilingual support teams — I speak your CSAT &amp; compliance language</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-handshake"></i>
            <p><strong>Client-facing ops: </strong>At Malt, I was the operational face for strategic clients across 7 European markets — I know how to manage demanding tech clients</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-sitemap"></i>
            <p><strong>Scalable org design: </strong>Structured growing teams from 0 to 70+ FTE at Meero, 300 staff across 17 African countries at Teleperformance — Maïka's next phase is familiar territory</p>
          </div>
          <div class="bullet">
            <i class="fa-solid fa-seedling"></i>
            <p><strong>Impact-aligned: </strong>Managing teams in sub-Saharan Africa shaped my conviction that quality jobs + operational excellence go hand in hand — Maïka's social mission is not a tagline for me</p>
          </div>
        </div>
      </div>
    </div>
  </section>
</template>

<script>
  fetch('../shared/cv-body.html')
    .then(response => response.text())
    .then(html => {
      document.getElementById('app').innerHTML = html;

      // 1. SELECT TEMPLATES
      const card1Template  = document.getElementById('skill-card-1');
      const card2Template  = document.getElementById('skill-card-2');
      const modal1Template = document.getElementById('modal-skill-card-1-template');
      const modal2Template = document.getElementById('modal-skill-card-2-template');

      // 2. SELECT PLACEHOLDERS
      const placeholder1 = document.querySelector('[data-placeholder="skill-card-1"]');
      const placeholder2 = document.querySelector('[data-placeholder="skill-card-2"]');

      // 3. INJECT CARDS
      if (placeholder1 && card1Template) placeholder1.replaceWith(card1Template.content.cloneNode(true));
      if (placeholder2 && card2Template) placeholder2.replaceWith(card2Template.content.cloneNode(true));

      // 4. INJECT MODALS TO BODY
      if (modal1Template) document.body.appendChild(modal1Template.content.cloneNode(true));
      if (modal2Template) document.body.appendChild(modal2Template.content.cloneNode(true));

      // 5. DYNAMIC HERO TEXT
      const heroPersonalityText = document.getElementById('hero-text-personality');
      if (heroPersonalityText && card1Template) {
        const card1Title = card1Template.content.querySelector('h3');
        if (card1Title) {
          // Get text only, stripping the icon
          heroPersonalityText.textContent = card1Title.textContent.trim();
        }
      }

      // 6. LOAD MAIN.JS
      const script = document.createElement('script');
      script.src = '../js/main.js';
      document.body.appendChild(script);
    });
</script>

</body>
</html>
